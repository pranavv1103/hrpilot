spring:
  datasource:
    url: jdbc:h2:mem:hrpilot;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: false
    show-sql: false
  sql:
    init:
      mode: never
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  redis:
    host: localhost
    port: 6380   # non-existent port; Redis ops will fail gracefully
  h2:
    console:
      enabled: true
      path: /h2-console
