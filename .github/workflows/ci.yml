name: HRPilot CI

"on":
  push:
    branches: [main, "appmod/**"]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests (Java 21)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: hrpilot
          POSTGRES_USER: hrpilot
          POSTGRES_PASSWORD: hrpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests (no Kafka/Redis needed — tests use mocks/H2)
        working-directory: backend
        run: ./mvnw test --no-transfer-progress
        env:
          OPENAI_API_KEY: sk-placeholder

      - name: Check compilation (full build including protobuf)
        working-directory: backend
        run: ./mvnw clean test-compile --no-transfer-progress

  frontend-build:
    name: Frontend Build (Node.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
